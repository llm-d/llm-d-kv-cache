name: CI - Build CUDA Wheels

on:
  pull_request:
  push:
    branches:
      - main-docker
  workflow_dispatch:

jobs:
  cuda-wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            arch: amd64
          - os: ubuntu-22.04-arm
            arch: arm64
    
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Build wheel in Docker (ARM64)
        if: matrix.arch == 'arm64'
        run: |
          docker run --rm \
            -v $(pwd):/workspace \
            nvidia/cuda:12.8.0-devel-ubuntu22.04 \
            bash -c "
              set -ex
              apt-get update
              apt-get install -y python3.12 python3.12-dev python3-pip build-essential ninja-build libnuma-dev git
              cd /workspace/kv_connectors/llmd_fs_backend
              python3.12 -m pip install --upgrade pip setuptools wheel ninja numpy
              python3.12 -m pip install torch==2.9.1
              export CUDA_HOME=/usr/local/cuda
              export PATH=\$CUDA_HOME/bin:\$PATH
              export LD_LIBRARY_PATH=\$CUDA_HOME/lib64:\$LD_LIBRARY_PATH
              export TORCH_CUDA_ARCH_LIST='7.0;7.5;8.0;8.6;8.9;9.0+PTX'
              rm -rf build dist *.egg-info wheels
              mkdir -p wheels
              python3.12 setup.py bdist_wheel -d wheels
              ls -lh wheels/
              chmod -R a+rw wheels
            "

      - name: Build wheel natively (AMD64)
        if: matrix.arch == 'amd64'
        run: |
          # For AMD64, build natively (faster)
          cd kv_connectors/llmd_fs_backend
          python3 -m pip install --upgrade pip setuptools wheel ninja numpy
          python3 -m pip install torch==2.9.1
          export CUDA_HOME=/usr/local/cuda
          export TORCH_CUDA_ARCH_LIST='7.0;7.5;8.0;8.6;8.9;9.0+PTX'
          rm -rf build dist *.egg-info wheels
          mkdir -p wheels
          python3 setup.py bdist_wheel -d wheels
          ls -lh wheels/

      - name: Upload wheels as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: cuda-wheels-${{ matrix.arch }}
          path: kv_connectors/llmd_fs_backend/wheels/*.whl
